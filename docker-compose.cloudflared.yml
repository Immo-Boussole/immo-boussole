# 🐳 Dedicated Docker Compose for Cloudflared + Portainer
# This file is designed for secure deployment without exposed ports.
# All external communication passes through the Cloudflare Tunnel.


# docker-compose.cloudflared.yml
name: immo-boussole-cloudflared


services:
  # ── 1. Immo-Boussole Application ──────────────────────────────────────────
  immo-boussole:
    # Use "build: ." when deploying via Portainer "Repository" method
    # or when building from a local clone.
    build: .
    image: immo-boussole-app:latest
    container_name: immo-boussole
    restart: unless-stopped
    environment:
      # Database connection (SQLite)
      - DATABASE_URL=sqlite:////app/data/immo_boussole.db
      # Internal URL for FlareSolverr
      - FLARESOLVERR_URL=http://flaresolverr:8191
      # Scraping configuration
      - SCRAPING_INTERVAL_HOURS=${SCRAPING_INTERVAL_HOURS:-12}
      - SCRAPINGBEE_API_KEY=${SCRAPINGBEE_API_KEY:-}
      # Captcha solver configuration
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-2captcha}
      - TWO_CAPTCHA_API_KEY=${TWO_CAPTCHA_API_KEY:-}
      # App debug mode
      - DEBUG=${DEBUG:-false}
    volumes:
      # SQLite database persistence
      - immo-boussole-db:/app/data
      # Static files persistence (photos, etc.)
      - immo-boussole-media:/app/static
    depends_on:
      - flaresolverr
    # NOTE: No "ports:" block is present.
    # The application is only accessible via the Docker network or the Tunnel.

  # ── 2. FlareSolverr (Cloudflare/DDoS Bypass) ────────────────────────────────
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Paris
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-2captcha}
      - TWO_CAPTCHA_API_KEY=${TWO_CAPTCHA_API_KEY:-}

  # ── 3. Cloudflare Tunnel Connector ─────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      # Replace with your Zero Trust token or use a .env file
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-YOUR_TOKEN_HERE}

# ── Persistent Volumes ──────────────────────────────────────────────────────
volumes:
  immo-boussole-db:
    name: immo-boussole-db
  immo-boussole-media:
    name: immo-boussole-media
