name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Install development dependencies
      run: |
        pip install httpx jinja2 fastapi sqlalchemy
        # Add any other dependencies if they are missing from requirements.txt
        
    - name: Run tests (CI mode)
      run: |
        python tests/run_tests.py --ci
