name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: "wikijm/immo-boussole"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            # Use format=long to ensure we have a tag matching github.sha
            type=sha,prefix=,format=long

      - name: Compute APP_VERSION build arg
        id: app_ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "value=${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.app_ver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Docker Scout scan
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1.20.4
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          only-severities: critical,high
          exit-code: true

  update-image-ref:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Le GITHUB_TOKEN par défaut suffit pour pousser sur le même repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image identifier
        id: image_id
        run: |
          # Tag principal : semver si c'est un tag, sinon SHA long
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            IMAGE_SHORT="${{ env.IMAGE_NAME }}:${VERSION}"
          else
            IMAGE_SHORT="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          fi
          IMAGE_FULL="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image_short=${IMAGE_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE_FULL}"   >> "$GITHUB_OUTPUT"

      - name: Update DOCKER_IMAGE.txt
        run: |
          {
            echo "${{ steps.image_id.outputs.image_full }}"
            echo ""
            echo "# Short tag (docker pull)"
            echo "${{ steps.image_id.outputs.image_short }}"
            echo ""
            echo "# Automatically generated by GitHub Actions"
            echo "# Date   : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "# Commit : ${{ github.sha }}"
            echo "# Ref    : ${{ github.ref_name }}"
          } > DOCKER_IMAGE.txt

      - name: Update Docker image badge in README.md
        run: |
          SHORT="${{ steps.image_id.outputs.image_short }}"
          # Encode pour shields.io : / → %2F, : → %3A
          ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${SHORT}")
          BADGE="[![Docker Image](https://img.shields.io/badge/image-${ENCODED}-0db7ed?logo=docker\&logoColor=white)](https://hub.docker.com/r/wikijm/immo-boussole)"
          sed -i "s|^\[!\[Docker Image\].*hub\.docker\.com/r/wikijm/immo-boussole.*|${BADGE}|" README.md

      - name: Update Docker image badge in README.fr.md
        run: |
          SHORT="${{ steps.image_id.outputs.image_short }}"
          ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${SHORT}")
          BADGE="[![Image Docker](https://img.shields.io/badge/image-${ENCODED}-0db7ed?logo=docker\&logoColor=white)](https://hub.docker.com/r/wikijm/immo-boussole)"
          sed -i "s|^\[!\[Image Docker\].*hub\.docker\.com/r/wikijm/immo-boussole.*|${BADGE}|" README.fr.md

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DOCKER_IMAGE.txt README.md README.fr.md
          if git diff --cached --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "chore: update Docker image ref → ${{ steps.image_id.outputs.image_short }} [skip ci]"
            git push
          fi
