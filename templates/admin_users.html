<!DOCTYPE html>
<html lang="{{ request.session.get('lang', 'fr') }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #131929;
            --surface-2: #1a2236;
            --border: rgba(255, 255, 255, 0.07);
            --text: #eef2ff;
            --text-2: #8b9cc8;
            --accent: #4f8ef7;
            --green: #10d9a4;
            --red: #f25c69;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-link {
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        h2 {
            margin: 0 0 1.5rem 0;
            font-size: 1.25rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-2);
            font-weight: 600;
        }

        input, select {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text);
            font-family: inherit;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn.danger {
            background: rgba(242, 92, 105, 0.1);
            color: var(--red);
            border: 1px solid rgba(242, 92, 105, 0.2);
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
        }

        .btn.danger:hover {
            background: var(--red);
            color: white;
        }

        .btn.secondary {
            background: rgba(79, 142, 247, 0.1);
            color: var(--accent);
            border: 1px solid rgba(79, 142, 247, 0.2);
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
        }

        .btn.secondary:hover {
            background: var(--accent);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 0.75rem;
            color: var(--text-2);
            text-transform: uppercase;
            padding: 1rem;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .role-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .role-admin { background: rgba(79, 142, 247, 0.15); color: var(--accent); }
        .role-user { background: rgba(16, 217, 164, 0.15); color: var(--green); }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert.success { background: rgba(16, 217, 164, 0.1); color: var(--green); border: 1px solid rgba(16, 217, 164, 0.2); }
        .alert.error { background: rgba(242, 92, 105, 0.1); color: var(--red); border: 1px solid rgba(242, 92, 105, 0.2); }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Retour au Dashboard</a>
            <h1>Gestion des Utilisateurs</h1>
        </div>

        <div id="alert" class="alert"></div>

        <div class="card">
            <h2>Créer un utilisateur</h2>
            <form id="createUserForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nom d'utilisateur</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="form-group">
                        <label>Rôle</label>
                        <select id="role">
                            <option value="user">Utilisateur</option>
                            <option value="admin">Administrateur</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Créer</button>
            </form>
        </div>

        <div class="card">
            <h2>Liste des Utilisateurs</h2>
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Rôle</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.username }}</td>
                        <td><span class="role-badge role-{{ user.role }}">{{ user.role }}</span></td>
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn secondary" onclick="changePassword({{ user.id }}, '{{ user.username }}')">
                                    <i class="fas fa-key"></i>
                                </button>
                                {% if user.username != request.session.get('username') %}
                                <button class="btn danger" onclick="deleteUser({{ user.id }})">
                                    <i class="fas fa-trash"></i>
                                </button>
                                {% endif %}
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const alertBox = document.getElementById('alert');

        function showAlert(msg, type) {
            alertBox.textContent = msg;
            alertBox.className = 'alert ' + type;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
        }

        document.getElementById('createUserForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const res = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });

                if (res.ok) {
                    showAlert('Utilisateur créé avec succès', 'success');
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    const err = await res.json();
                    showAlert('Erreur: ' + (err.detail || 'Inconnue'), 'error');
                }
            } catch (err) {
                showAlert('Erreur de connexion', 'error');
            }
        };

        async function deleteUser(id) {
            if (!confirm('Voulez-vous vraiment supprimer cet utilisateur ?')) return;

            try {
                const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showAlert('Utilisateur supprimé', 'success');
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    const err = await res.json();
                    showAlert('Erreur: ' + (err.detail || 'Inconnue'), 'error');
                }
            } catch (err) {
                showAlert('Erreur de connexion', 'error');
            }
        }

        async function changePassword(id, username) {
            const newPassword = prompt(`Nouveau mot de passe pour ${username} :`);
            if (!newPassword) return;

            try {
                const res = await fetch(`/api/admin/users/${id}/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPassword })
                });

                if (res.ok) {
                    showAlert(`Mot de passe de ${username} mis à jour`, 'success');
                } else {
                    const err = await res.json();
                    showAlert('Erreur: ' + (err.detail || 'Inconnue'), 'error');
                }
            } catch (err) {
                showAlert('Erreur de connexion', 'error');
            }
        }
    </script>
</body>

</html>
