<!DOCTYPE html>
<html lang="{{ request.session.get('lang', 'fr') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t(request, 'setup.title') }} — {{ t(request, 'app.title') }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #131929;
            --surface-2: #1a2236;
            --border: rgba(255, 255, 255, 0.07);
            --text: #eef2ff;
            --text-2: #8b9cc8;
            --accent: #4f8ef7;
            --accent-2: #6366f1;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 14px;
            --trans: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Add a nice glow effect for this special setup page */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(79, 142, 247, 0.1) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        .login-card > * {
            position: relative;
            z-index: 1;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            -webkit-text-fill-color: var(--accent);
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 0.875rem;
            color: var(--text-2);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-2);
            font-size: 1rem;
        }

        input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--trans);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.15);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none;
            border-radius: 10px;
            padding: 0.9rem;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--trans);
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 142, 247, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }
        
        .badge {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 1rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        /* Language Selector */
        .lang-selector {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 3px;
            gap: 2px;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-2);
            transition: var(--trans);
        }

        .lang-item:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
        }

        .lang-item.active {
            background: var(--accent);
            color: #fff;
        }

        .lang-item.active:hover {
            background: var(--accent-2);
        }

        .lang-item span {
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="lang-selector">
        <a href="/lang/fr" class="lang-item {{ 'active' if request.session.get('lang', 'fr') == 'fr' else '' }}">
            <span>🇫🇷</span> FR
        </a>
        <a href="/lang/en" class="lang-item {{ 'active' if request.session.get('lang', 'fr') == 'en' else '' }}">
            <span>🇬🇧</span> EN
        </a>
    </div>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-compass"></i>
            {{ t(request, 'app.title') }}
        </div>
        
        <div class="badge">{{ t(request, 'setup.subtitle') }}</div>
        <h1>{{ t(request, 'setup.title') }}</h1>
        <p>{{ t(request, 'setup.welcome') }}</p>


        <form method="POST" id="setupForm">
            <div class="form-group">
                <label for="username">{{ t(request, 'setup.username') }}</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-shield"></i>
                    <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">{{ t(request, 'setup.new_password') }}</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn">{{ t(request, 'setup.create_account') }}</button>
        </form>

    </div>
</body>
</html>
