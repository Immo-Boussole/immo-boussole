name: immo-boussole

services:

  # ── Application principale ──────────────────────────────────────────────────
  immo-boussole:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: immo-boussole-app
    restart: unless-stopped
    depends_on:
      - flaresolverr
    ports:
      - "8000:8000"
    networks:
      - immo-boussole-net

    environment:
      # Base de données SQLite (chemin dans le volume)
      DATABASE_URL: "sqlite:////app/data/immo_boussole.db"
      # Utilise le service flaresolverr interne au réseau Docker
      FLARESOLVERR_URL: "http://immo-boussole-flaresolverr:8191"
      SCRAPING_INTERVAL_HOURS: "${SCRAPING_INTERVAL_HOURS:-12}"
      SCRAPINGBEE_API_KEY: "${SCRAPINGBEE_API_KEY:-}"
      DEBUG: "${DEBUG:-false}"

    volumes:
      # Persistance de la base de données SQLite
      - db-data:/app/data
      # Persistance des photos téléchargées
      - media-data:/app/static

  # ── Moteur de Scraping (Self-Hosted Cloudflare Bypass) ─────────────────────
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: immo-boussole-flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    networks:
      - immo-boussole-net
    environment:
      - LOG_LEVEL=info
      # Captcha solver : 2captcha (nécessite TWO_CAPTCHA_API_KEY dans .env)
      # Mettre CAPTCHA_SOLVER=none pour désactiver
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-2captcha}
      - TWO_CAPTCHA_API_KEY=${TWO_CAPTCHA_API_KEY:-}

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Réseau interne ──────────────────────────────────────────────────────────
networks:
  immo-boussole-net:
    name: immo-boussole-net
    driver: bridge

# ── Volumes persistants ─────────────────────────────────────────────────────
volumes:
  db-data:
    name: immo-boussole-db
  media-data:
    name: immo-boussole-media
