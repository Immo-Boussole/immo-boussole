# ⚠️ LOCAL DEVELOPMENT ONLY
# Note: This file contains bind mounts (./app, ./templates, etc.) that will fail
# in most cloud/Portainer environments unless files are already present on the host.
# For Portainer/Cloud deployment, please use: docker-compose.cloudflared.yml

name: immo-boussole

services:

  # ── Application principale ──────────────────────────────────────────────────
  immo-boussole:
    build:
      context: .
      dockerfile: Dockerfile
    image: immo-boussole-app:latest
    container_name: immo-boussole-app
    restart: unless-stopped
    depends_on:
      - browserless
    ports:
      - "8000:8000"
    networks:
      - immo-boussole-net

    environment:
      # Base de données SQLite (chemin dans le volume)
      DATABASE_URL: "sqlite:////app/data/immo_boussole.db"
      # Utilise le service browserless interne au réseau Docker
      BROWSERLESS_URL: "ws://browserless:3000"
      SCRAPING_INTERVAL_HOURS: "${SCRAPING_INTERVAL_HOURS:-12}"
      SCRAPINGBEE_API_KEY: "${SCRAPINGBEE_API_KEY:-}"
      DEBUG: "${DEBUG:-true}"
      # Captcha solver : 2captcha (nécessite TWO_CAPTCHA_API_KEY dans .env)
      CAPTCHA_SOLVER: "${CAPTCHA_SOLVER:-2captcha}"
      TWO_CAPTCHA_API_KEY: "${TWO_CAPTCHA_API_KEY:-}"

    volumes:
      # Persistance de la base de données SQLite
      - db-data:/app/data
      # Persistance des photos téléchargées
      - media-data:/app/static
      # Mappage pour le développement (réflexion immédiate des changements)
      - ./templates:/app/templates
      - ./app:/app/app
      - ./locales:/app/locales

  # ── Headless Browser (Playwright / Chrome) ─────────────────────────────────
  browserless:
    image: browserless/chrome:latest
    container_name: browserless
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - immo-boussole-net
    environment:
      - TIMEOUT=60000
      - CONCURRENT=10
      - MAX_CONCURRENT_SESSIONS=10
      - MAX_QUEUE_LENGTH=10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Réseau interne ──────────────────────────────────────────────────────────
networks:
  immo-boussole-net:
    name: immo-boussole-net
    driver: bridge

# ── Volumes persistants ─────────────────────────────────────────────────────
volumes:
  db-data:
    name: immo-boussole-db
  media-data:
    name: immo-boussole-media
