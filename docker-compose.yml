services:

  # ── Application principale ──────────────────────────────────────────────────
  immo-boussole:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: immo-boussole
    restart: unless-stopped
    depends_on:
      - pinchtab
    ports:
      - "8000:8000"

    environment:
      # Base de données SQLite (chemin dans le volume)
      DATABASE_URL: "sqlite:////app/data/immo_boussole.db"
      # Utilise le service pinchtab interne au réseau Docker
      PINCHTAB_URL: "http://pinchtab:9867"
      SCRAPING_INTERVAL_HOURS: "${SCRAPING_INTERVAL_HOURS:-12}"
      SCRAPINGBEE_API_KEY: "${SCRAPINGBEE_API_KEY:-}"
      DEBUG: "${DEBUG:-false}"

    volumes:
      # Persistance de la base de données SQLite
      - db-data:/app/data
      # Persistance des photos téléchargées
      - media-data:/app/static

  # ── Moteur de Scraping (Headless Browser) ───────────────────────────────────
  pinchtab:
    image: pinchtab/pinchtab
    container_name: pinchtab
    restart: unless-stopped
    ports:
      - "9867:9867"
    # Note: PinchTab expose par défaut son API sur le port 9867

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/listings')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes persistants ─────────────────────────────────────────────────────
volumes:
  db-data:
    name: immo-boussole-db
  media-data:
    name: immo-boussole-media
