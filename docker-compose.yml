---
# ⚠️ LOCAL DEVELOPMENT ONLY
# Note: This file contains bind mounts (./app, ./templates, etc.) that will fail
# in most cloud/Portainer environments unless files are already present on the host.
# For Portainer/Cloud deployment, please use: docker-compose.cloudflared.yml

# docker-compose.yml
name: immo-boussole

services:

  # ── Main Application ─────────────────────────────────────────────────────────
  immo-boussole:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-latest}
    image: immo-boussole-app:${APP_VERSION:-latest}
    container_name: immo-boussole-app
    restart: always
    depends_on:
      browserless:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - immo-boussole-net
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

    environment:
      # SQLite database (path within the volume)
      DATABASE_URL: "sqlite:////app/data/immo_boussole.db"
      # Headless browser (Playwright via CDP → Browserless)
      BROWSERLESS_URL: "ws://browserless:3000"
      SCRAPING_INTERVAL_HOURS: "${SCRAPING_INTERVAL_HOURS:-12}"
      DEBUG: "${DEBUG:-true}"

    volumes:
      # SQLite database persistence
      - db-data:/app/data
      # Development mapping (hot-reloading of changes)
      - ./static:/app/static
      - ./templates:/app/templates
      - ./app:/app/app
      - ./locales:/app/locales
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── MCP Server (Model Context Protocol) ──────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: immo-boussole-mcp:${APP_VERSION:-latest}
    container_name: immo-boussole-mcp
    restart: always
    depends_on:
      immo-boussole:
        condition: service_healthy
    environment:
      DATABASE_URL: "sqlite:////app/data/immo_boussole.db"
    volumes:
      - db-data:/app/data
      - ./app:/app/app
    ports:
      - "8001:8001"
    # Run as SSE server to allow remote/containerized access
    command: ["python", "-m", "app.mcp_server"]
    networks:
      - immo-boussole-net

  # ── Scraping Engine (Headless Chrome via Browserless) ────────────────────────
  browserless:
    image: browserless/chrome:1-chrome-stable
    container_name: browserless
    restart: always
    shm_size: 2gb
    ports:
      - "3000:3000"
    networks:
      - immo-boussole-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    environment:
      # 1 session: prevents two Chrome instances competing for RAM on constrained hosts
      - MAX_CONCURRENT_SESSIONS=1
      # Allow launch up to 97% memory (default 90% blocks jobs on hosts idling at 88-89%)
      - MAX_MEMORY_PERCENT=97
      - CONNECTION_TIMEOUT=120000          # WebSocket session timeout (ms); Python client retries 3× with 30s each
      - DEFAULT_BLOCK_ADS=false
      - DEFAULT_STEALTH=true
      # Disabled: launch Chrome on-demand, not at startup (was killing host at 90%+ MEM)
      - PREBOOT_CHROME=false
      - TOKEN=${BROWSERLESS_TOKEN:-}
      - TZ=Europe/Paris

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Internal Network ─────────────────────────────────────────────────────────
networks:
  immo-boussole-net:
    name: immo-boussole-net
    driver: bridge

# ── Persistent Volumes ───────────────────────────────────────────────────────
volumes:
  db-data:
    name: immo-boussole-db
  media-data:
    name: immo-boussole-media
